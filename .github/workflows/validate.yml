name: validate

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: goreleaser check
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          args: check
      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: test
        run: go test -race -v ./...
